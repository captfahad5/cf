<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabin CF Live Expiry Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f7fc; --card: #fff; --text: #112240; --muted: #5f6b84; --line: #d8e1ef;
      --brand: #0b66ff; --brand-dark: #084fc9; --radius: 14px; --shadow: 0 8px 30px rgba(17,34,64,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: "Manrope", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 500px at 10% -20%, #dce9ff 0%, transparent 60%),
                  radial-gradient(1000px 450px at 100% 100%, #dff4ff 0%, transparent 55%),
                  var(--bg);
    }
    .app {
      max-width: 1400px; margin: 0 auto; background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .hero { padding: 18px 22px; background: linear-gradient(135deg, #0b66ff, #1887ff 60%, #33b2ff); color: #fff; }
    .hero h1 { margin: 0; font-size: 24px; font-weight: 800; }
    .hero .sub { margin-top: 6px; font-size: 14px; font-weight: 600; opacity: .95; }
    .panel { padding: 16px 18px; border-top: 1px solid var(--line); }
    .panel h3 { margin: 0 0 12px; font-size: 16px; font-weight: 800; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr minmax(260px, 2fr) minmax(260px, 2fr) 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label { font-size: 12px; color: var(--muted); font-weight: 700; }
    input, button { font-family: inherit; font-size: 13px; border-radius: 10px; border: 1px solid var(--line); padding: 9px 10px; }
    input:focus { outline: none; border-color: #8cb5ff; box-shadow: 0 0 0 3px rgba(11,102,255,.15); }

    #desc, #rectification {
      width: 100%;
    }

    button { cursor: pointer; font-weight: 700; }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-dark); }
    .top-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .exportBtn, .importBtn, #clearedTabBtn { border: none; border-radius: 8px; padding: 8px 10px; font-size: 12px; font-weight: 800; color: #fff; }
    .exportBtn, .importBtn { background: #1f9d57; }
    #clearedTabBtn { background: #5f6672; }
    .table-wrap { border-top: 1px solid var(--line); overflow: auto; }
    table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1200px; }
    th, td { border-bottom: 1px solid #eaf0fa; padding: 9px 8px; text-align: center; vertical-align: middle; font-size: 13px; }
    th {
      position: sticky; top: 0; z-index: 2; background: #f7faff; border-bottom: 1px solid var(--line);
      font-weight: 800; color: #23324d; white-space: nowrap;
    }

    td:nth-child(1), td:nth-child(2) { white-space: nowrap; }

    /* Description and Rectification exact same width */
    #cfTable th:nth-child(3),
    #cfTable td:nth-child(3),
    #cfTable th:nth-child(7),
    #cfTable td:nth-child(7) {
      width: 260px;
      min-width: 260px;
      max-width: 260px;
    }

    #cfTable td:nth-child(3),
    #cfTable td:nth-child(7) {
      text-align: left;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .statusCell { font-weight: 800; border-radius: 8px; }
    .rowRed { background: #ffe7e7; color: #8b1717; font-weight: 700; }
    .orange { background: #fff1dd; color: #8f5b0c; }
    .yellow { background: #fff9d8; color: #6a5a00; }
    .green { background: #e8f9ef; color: #0c7a40; }
    .actionBtns { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .mailBtn, .trackBtn, .deleteBtn, .editBtn, .rieBtn { border: none; border-radius: 7px; padding: 6px 9px; font-size: 12px; font-weight: 800; }
    .mailBtn { background: #0b66ff; color: #fff; }
    .trackBtn { background: #169cb0; color: #fff; }
    .deleteBtn { background: #d93838; color: #fff; }
    .editBtn { background: #ffc928; color: #222; }
    .rieBtn { background: #5d44c8; color: #fff; }
    .trackerInput { width: 110px; font-size: 12px; padding: 6px; }
    .aircraftCell { cursor: pointer; color: #112240; font-weight: 800; }
    .aircraftCell:hover { color: var(--brand); text-decoration: underline; }

    @media (max-width: 1100px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .field:nth-child(3),
      .form-grid .field:nth-child(4) { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>Cabin CF Live Expiry Tracker</h1>
      <div class="sub">✈ Made By Capt Fahad | Powered by AI 💻</div>
    </div>

    <div class="panel">
      <h3>Add / Edit Item</h3>
      <div class="form-grid">
        <div class="field"><label for="aircraft">Aircraft</label><input type="text" id="aircraft" placeholder="A6-XXX" /></div>
        <div class="field"><label for="aircraftDate">Date</label><input type="date" id="aircraftDate" /></div>
        <div class="field"><label for="desc">Description</label><input type="text" id="desc" placeholder="Item description (optional)" /></div>
        <div class="field"><label for="rectification">Rectification</label><input type="text" id="rectification" placeholder="Rectification details (optional)" /></div>
        <div class="field"><label for="expiry">Expiry Date</label><input type="date" id="expiry" /></div>
        <button id="addBtn" type="button" class="btn-primary" onclick="addOrUpdateItem()">Add</button>
      </div>
      <div class="top-actions">
        <button class="exportBtn" type="button" onclick="exportData()">Export JSON</button>
        <button class="importBtn" type="button" onclick="importData()">Import JSON</button>
        <button id="clearedTabBtn" type="button" onclick="toggleClearedTab()">Cleared Entries</button>
        <input type="file" id="importFile" style="display:none" />
      </div>
    </div>

    <div class="table-wrap">
      <table id="cfTable">
        <tr>
          <th>Aircraft</th><th>Date</th><th>Description</th><th>Expiry Date</th>
          <th>Days Left</th><th>Status</th><th>Rectification</th><th>Action</th>
        </tr>
      </table>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDQEwq76yLe8bv7Pc4ATjIGq_uwX1idQto",
      authDomain: "cabin-cf-tracker.firebaseapp.com",
      projectId: "cabin-cf-tracker",
      storageBucket: "cabin-cf-tracker.firebasestorage.app",
      messagingSenderId: "533581915976",
      appId: "1:533581915976:web:c48d482403fded6fd2b57d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const itemsCol = db.collection("cfItems");
    const clearedCol = db.collection("cfClearedItems");

    let items = [], clearedItems = [], editId = null, currentFilter = "", showingCleared = false;

    function esc(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function parseLocalDate(ymd) {
      if (!ymd) return new Date(NaN);
      const [y, m, d] = ymd.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDateDMY(dateStr) {
      if (!dateStr) return "";
      const d = parseLocalDate(dateStr);
      if (isNaN(d)) return dateStr;
      const months = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
      const dd = String(d.getDate()).padStart(2, "0");
      return dd + "-" + months[d.getMonth()] + "-" + d.getFullYear();
    }

    function calculateDays(expiry) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const expDate = parseLocalDate(expiry);
      expDate.setHours(0, 0, 0, 0);
      return Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
    }

    itemsCol.onSnapshot(snapshot => {
      items = [];
      snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
      if (!showingCleared) renderTable();
    });

    clearedCol.onSnapshot(snapshot => {
      clearedItems = [];
      snapshot.forEach(doc => clearedItems.push({ id: doc.id, ...doc.data() }));
      if (showingCleared) renderClearedTable();
    });

    function renderTable() {
      const table = document.getElementById("cfTable");
      table.innerHTML = "<tr><th>Aircraft</th><th>Date</th><th>Description</th><th>Expiry Date</th><th>Days Left</th><th>Status</th><th>Rectification</th><th>Action</th></tr>";
      items.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));

      items.forEach((item,index)=>{
        if (currentFilter && item.aircraft !== currentFilter) return;

        const daysLeft = calculateDays(item.expiry);
        let statusClass = "", statusText = "", actionBtn = "", rowClass = "";

        if (daysLeft < 0) {
          rowClass = "rowRed";
          statusText = "Expired";
          actionBtn = '<button class="mailBtn" onclick="generateMailByIndex(' + index + ')">Mail</button>';
        } else if (daysLeft <= 4) {
          rowClass = "rowRed";
          statusText = "Critical (<=4 Days)";
          actionBtn = '<button class="mailBtn" onclick="generateMailByIndex(' + index + ')">Mail</button>';
        } else if (daysLeft <= 7) {
          statusClass = "orange";
          statusText = "7 Days Left";
          actionBtn = '<button class="mailBtn" onclick="generateMailByIndex(' + index + ')">Mail</button>';
        } else if (daysLeft <= 20) {
          statusClass = "yellow";
          statusText = "20 Days Left";
        } else {
          statusClass = "green";
          statusText = "OK";
        }

        table.innerHTML += '<tr class="' + rowClass + '">' +
          '<td class="aircraftCell" onclick=\'filterByAircraft(' + JSON.stringify(item.aircraft) + ')\'>' + esc(item.aircraft) + '</td>' +
          '<td>' + esc(formatDateDMY(item.aircraftDate || "")) + '</td>' +
          '<td>' + esc(item.desc || "") + '</td>' +
          '<td>' + esc(formatDateDMY(item.expiry)) + '</td>' +
          '<td>' + daysLeft + '</td>' +
          '<td class="statusCell ' + statusClass + '">' + statusText + '</td>' +
          '<td>' + esc(item.rectification || "") + '</td>' +
          '<td><div class="actionBtns">' +
            actionBtn +
            '<button class="editBtn" onclick="editItem(' + index + ')">Edit</button>' +
            '<button class="deleteBtn" onclick="clearItem(' + index + ')">X</button>' +
            '<div style="margin-left:auto; display:flex; gap:4px; align-items:center;">' +
              '<input type="text" class="trackerInput" id="link_' + index + '" value="' + esc(item.link || "") + '" placeholder="Tracker" onchange="updateLink(' + index + ', this.value)">' +
              '<button class="trackBtn" onclick="openLink(document.getElementById(\'link_' + index + '\').value)">Track</button>' +
              '<button class="rieBtn" onclick="handleRIE(' + index + ')">RIE</button>' +
            '</div>' +
          '</div></td>' +
        '</tr>';
      });
    }

    function renderClearedTable() {
      const table = document.getElementById("cfTable");
      table.innerHTML = "<tr><th>Aircraft</th><th>Date</th><th>Description</th><th>Expiry Date</th><th>Days Left</th><th>Status</th><th>Rectification</th><th>Action</th></tr>";
      clearedItems.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));

      clearedItems.forEach((item,index)=>{
        const daysLeft = calculateDays(item.expiry);
        let statusClass="", statusText="", rowClass="";
        if (daysLeft < 0) { rowClass = "rowRed"; statusText = "Expired"; }
        else if (daysLeft <= 4) { rowClass = "rowRed"; statusText = "Critical (<=4 Days)"; }
        else if (daysLeft <= 7) { statusClass = "orange"; statusText = "7 Days Left"; }
        else if (daysLeft <= 20) { statusClass = "yellow"; statusText = "20 Days Left"; }
        else { statusClass = "green"; statusText = "OK"; }

        table.innerHTML += '<tr class="' + rowClass + '">' +
          '<td>' + esc(item.aircraft) + '</td>' +
          '<td>' + esc(formatDateDMY(item.aircraftDate || "")) + '</td>' +
          '<td>' + esc(item.desc || "") + '</td>' +
          '<td>' + esc(formatDateDMY(item.expiry)) + '</td>' +
          '<td>' + daysLeft + '</td>' +
          '<td class="statusCell ' + statusClass + '">' + statusText + '</td>' +
          '<td>' + esc(item.rectification || "") + '</td>' +
          '<td><button class="deleteBtn" onclick="permanentDelete(' + index + ')">Delete Permanently</button></td>' +
        '</tr>';
      });
    }

    function toggleClearedTab() {
      showingCleared = !showingCleared;
      const btn = document.getElementById("clearedTabBtn");
      if (showingCleared) {
        btn.innerText = "Back to Active";
        renderClearedTable();
      } else {
        btn.innerText = "Cleared Entries";
        renderTable();
      }
    }

    function clearItem(index) {
      const item = items[index];
      const data = { ...item };
      delete data.id;
      clearedCol.add(data).then(() => itemsCol.doc(item.id).delete());
    }

    function permanentDelete(index) {
      clearedCol.doc(clearedItems[index].id).delete();
    }

    function filterByAircraft(ac) {
      currentFilter = (currentFilter === ac ? "" : ac);
      if (!showingCleared) renderTable();
    }

    function updateLink(i, v) {
      itemsCol.doc(items[i].id).update({ link: v });
    }

    function openLink(v) {
      if (v) window.open(v, "_blank");
      else alert("No tracker link added.");
    }

    function handleRIE(i) {
      const item = items[i];
      if (item.rieImage) {
        if (confirm("RIE image already exists. Replace?")) uploadRIE(i);
        else {
          const win = window.open();
          win.document.write('<img src="' + item.rieImage + '" style="max-width:100%;max-height:100%"/>');
        }
      } else uploadRIE(i);
    }

    function uploadRIE(i) {
      const item = items[i];
      const input = document.createElement("input");
      input.type = "file"; input.accept = "image/*";
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          itemsCol.doc(item.id).update({ rieImage: evt.target.result })
            .then(() => alert("RIE uploaded! Click RIE to view/replace."))
            .catch(err => alert("Error uploading image: " + err.message));
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    async function addOrUpdateItem() {
      const aircraft = document.getElementById("aircraft").value.trim();
      const aircraftDate = document.getElementById("aircraftDate").value;
      const desc = document.getElementById("desc").value.trim();
      const rectification = document.getElementById("rectification").value.trim();
      const expiry = document.getElementById("expiry").value;

      if (!aircraft || !expiry) {
        alert("Please fill Aircraft and Expiry Date");
        return;
      }

      const addBtn = document.getElementById("addBtn");
      addBtn.disabled = true;
      try {
        if (editId !== null) {
          await itemsCol.doc(editId).update({ aircraft, aircraftDate, desc, rectification, expiry });
          editId = null;
          addBtn.innerText = "Add";
        } else {
          await itemsCol.add({ aircraft, aircraftDate, desc, rectification, expiry, link: "", rieImage: "" });
        }

        document.getElementById("aircraft").value = "";
        document.getElementById("aircraftDate").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("rectification").value = "";
        document.getElementById("expiry").value = "";
      } catch (err) {
        alert("Add/Update failed: " + err.message);
        console.error(err);
      } finally {
        addBtn.disabled = false;
      }
    }

    function editItem(i) {
      const item = items[i];
      document.getElementById("aircraft").value = item.aircraft || "";
      document.getElementById("aircraftDate").value = item.aircraftDate || "";
      document.getElementById("desc").value = item.desc || "";
      document.getElementById("rectification").value = item.rectification || "";
      document.getElementById("expiry").value = item.expiry || "";
      editId = item.id;
      document.getElementById("addBtn").innerText = "Update";
    }

    function generateMailByIndex(i) {
      const item = items[i];
      if (!item) return;
      generateMail(item.aircraft || "", item.desc || "", item.expiry || "");
    }

    function generateMail(a, d, e) {
      const subject = "Request for Hangar Parking - Cabin CF Expiry";
      const body = "Dear Planning,\n\nAircraft Registration: " + a +
        "\nItem Description: " + d +
        "\nExpiry Date: " + formatDateDMY(e) +
        "\n\nKindly arrange hangar parking at White Body Hangar for rectification." +
        "\nCoordination with Aircraft Furnishing Shop will be carried out accordingly." +
        "\n\nRequest your support.\n\nRegards,\nCabin Maintenance";
      const gmailLink = "https://mail.google.com/mail/?view=cm&fs=1&to=planning@yourcompany.com&su=" +
        encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
      window.open(gmailLink, "_blank");
    }

    function exportData() {
      const dataStr = JSON.stringify({ active: items, cleared: clearedItems }, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "Cabin_CF_Tracker.json"; a.click();
      URL.revokeObjectURL(url);
    }

    const importFileInput = document.getElementById("importFile");
    importFileInput.addEventListener("change", async function() {
      const file = importFileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!confirm("This will import your JSON file into the LIVE Firebase database. Are you sure?")) {
            importFileInput.value = "";
            return;
          }

          const toImportActive = imported.active || (Array.isArray(imported) ? imported : []);
          const toImportCleared = imported.cleared || [];

          for (const item of toImportActive) {
            const data = { ...item };
            delete data.id;
            await itemsCol.add(data);
          }
          for (const item of toImportCleared) {
            const data = { ...item };
            delete data.id;
            await clearedCol.add(data);
          }

          alert("Data imported successfully to Firebase!");
          importFileInput.value = "";
        } catch (err) {
          alert("Error parsing JSON: " + err);
        }
      };
      reader.readAsText(file);
    });

    function importData() {
      importFileInput.click();
    }
  </script>
</body>
</html>
