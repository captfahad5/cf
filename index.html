<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabin CF Live Expiry Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#f5f7fb;
      --bg-2:#eaf1ff;
      --card:#ffffff;
      --ink:#152238;
      --muted:#5c6b84;
      --line:#d9e1ef;
      --brand:#0a66ff;
      --brand-2:#0b4fc6;
      --danger:#d92d20;
      --warn:#ef8e00;
      --safe:#0c8f4b;
      --radius:14px;
      --shadow:0 10px 30px rgba(16, 42, 112, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #dbe9ff 0%, transparent 38%),
        radial-gradient(circle at 90% 90%, #d7f0ff 0%, transparent 35%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 20px 22px;
      background: linear-gradient(120deg, #0a66ff, #0f7ae5 55%, #1aa4ff);
      color: white;
    }
    .hero h1 { margin: 0; font-size: 24px; font-weight: 800; }
    .hero p { margin: 6px 0 0; opacity: .95; font-weight: 600; }

    .panel { padding: 18px 22px; border-top: 1px solid var(--line); }

    .panel h3 { margin: 0 0 14px; font-size: 16px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr 2fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 700; }

    input, button {
      font-family: inherit;
      font-size: 13px;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 9px 10px;
    }

    input:focus {
      outline: none;
      border-color: #8bb5ff;
      box-shadow: 0 0 0 3px rgba(10,102,255,.15);
    }

    button { cursor: pointer; font-weight: 700; }

    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-2); }

    .btn-green { background: #14944f; color: #fff; border-color: #14944f; }
    .btn-gray { background: #4b5565; color: #fff; border-color: #4b5565; }

    .top-actions{
      display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;
    }

    .table-wrap { overflow: auto; border-top: 1px solid var(--line); }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1080px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #edf1f8;
      vertical-align: middle;
      text-align: center;
      font-size: 13px;
    }

    thead th, tr:first-child th {
      position: sticky;
      top: 0;
      background: #f7faff;
      color: #22324f;
      z-index: 1;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
      white-space: nowrap;
    }

    td:nth-child(3), td:nth-child(7) {
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .statusCell { font-weight: 800; border-radius: 8px; }
    .rowRed { background-color: #ffe7e5; color: #8e1a11; font-weight: 700; }
    .orange { background-color: #fff1dc; color: #8a5200; }
    .yellow { background-color: #fff8cf; color: #6e5a00; }
    .green { background-color: #e4f8ec; color: #086839; }

    .actionBtns {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mailBtn,.trackBtn,.deleteBtn,.editBtn,.rieBtn,.exportBtn,.importBtn,#clearedTabBtn{
      border:none; border-radius:8px; padding:6px 9px; font-size:12px; font-weight:700;
    }
    .mailBtn { background:#0a66ff; color:#fff; }
    .trackBtn { background:#0f9eb1; color:#fff; }
    .deleteBtn { background:#d92d20; color:#fff; }
    .editBtn { background:#f1b800; color:#1f2430; }
    .rieBtn { background:#1565c0; color:#fff; }
    .exportBtn,.importBtn { background:#14944f; color:#fff; }
    #clearedTabBtn { background:#4b5565; color:#fff; }

    input.trackerInput { width: 110px; font-size: 12px; padding: 6px; }

    .aircraftCell { cursor: pointer; font-weight: 800; }
    .aircraftCell:hover { color: var(--brand); text-decoration: underline; }

    @media (max-width: 980px){
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .field:nth-child(3){ grid-column: 1 / -1; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="hero">
      <h1>Cabin CF Live Expiry Tracker</h1>
      <p>Made by Capt Fahad | Powered by AI</p>
    </div>

    <div class="panel">
      <h3>Add / Edit Item</h3>
      <div class="form-grid">
        <div class="field">
          <label for="aircraft">Aircraft</label>
          <input type="text" id="aircraft" placeholder="e.g. A6-XYZ">
        </div>
        <div class="field">
          <label for="aircraftDate">Date</label>
          <input type="date" id="aircraftDate">
        </div>
        <div class="field">
          <label for="desc">Description</label>
          <input type="text" id="desc" placeholder="Item details">
        </div>
        <div class="field">
          <label for="expiry">Expiry Date</label>
          <input type="date" id="expiry">
        </div>
        <button id="addBtn" class="btn-primary" onclick="addOrUpdateItem()">Add</button>
      </div>

      <div class="top-actions">
        <button class="exportBtn" onclick="exportData()">Export JSON</button>
        <button class="importBtn" onclick="importData()">Import JSON</button>
        <button id="clearedTabBtn" onclick="toggleClearedTab()">Cleared Entries</button>
        <input type="file" id="importFile" style="display:none" />
      </div>
    </div>

    <div class="table-wrap">
      <table id="cfTable">
        <tr>
          <th>Aircraft</th>
          <th>Date</th>
          <th>Description</th>
          <th>Expiry Date</th>
          <th>Days Left</th>
          <th>Status</th>
          <th>Rectification</th>
          <th>Action</th>
        </tr>
      </table>
    </div>
  </div>

  <!-- keep your existing Firebase scripts + JS logic below -->
</body>
</html>
